; PlatformIO Project Configuration File
;
; This intentionally mirrors the TelemetryV2 ESP32-S3 Arduino setup so both
; boards build against the same platform, board profile, USB CDC flags, and
; library versions.

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
	mikalhart/TinyGPSPlus@^1.1.0
	adafruit/Adafruit MPU6050@^2.2.6
	adafruit/Adafruit Unified Sensor@^1.1.15
	jgromes/RadioLib@^7.4.0
	adafruit/Adafruit GPS Library@^1.7.5
	https://github.com/tanmaylad77/iem_can_protocol.git#v0.4.0
